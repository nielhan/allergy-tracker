<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>알러지한알 — Daily Allergy Bite</title>
<style>
  :root {
    --yolk: #E8A200;
    --shell: #FFFDF5;
    --ink: #2A2A2A;
    --muted: #6B6B6B;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
    background: var(--shell);
    color: var(--ink);
    line-height: 1.6;
  }
  header {
    background: var(--yolk);
    color: white;
    padding: 48px 24px 40px;
    text-align: center;
  }
  header h1 { margin: 0 0 8px; font-size: 2rem; }
  header p { margin: 0; opacity: 0.95; }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }
  .links {
    display: grid;
    gap: 12px;
    margin-top: 24px;
  }
  .links a {
    display: block;
    padding: 16px 20px;
    background: white;
    border: 1px solid #EEE;
    border-radius: 12px;
    text-decoration: none;
    color: var(--ink);
    font-weight: 500;
    transition: border-color 0.15s, transform 0.15s;
  }
  .links a:hover {
    border-color: var(--yolk);
    transform: translateY(-1px);
  }
  .links a small {
    display: block;
    color: var(--muted);
    font-weight: 400;
    margin-top: 2px;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 24px;
  }
</style>
</head>
<body>
<header>
  <h1>알러지한알</h1>
  <p>Daily Allergy Bite — 계란 알러지 면역치료 기록 앱</p>
</header>
<main>
  <p>부모가 아이의 매일 복용과 반응을 간편하게 기록할 수 있도록 설계된 로컬 전용 기록 앱입니다.</p>
  <div class="links">
    <a href="privacy.html">
      개인정보처리방침
      <small>Privacy Policy</small>
    </a>
    <a href="mailto:hne8936@gmail.com">
      문의하기
      <small>hne8936@gmail.com</small>
    </a>
  </div>
</main>
<footer>© 2026 알러지한알</footer>
</body>
</html>
